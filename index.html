<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #0f172a;
        color: #f8fafc;
      }
    </style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
  >
    <div id="error-modal" class="hidden fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/80 backdrop-blur-sm transition-all duration-300">
        <div class="bg-slate-800 p-8 rounded-3xl border border-rose-500/30 max-w-sm w-full text-center shadow-2xl">
            <div class="w-16 h-16 bg-rose-500/20 rounded-full mx-auto flex items-center justify-center mb-5">
                <svg class="w-8 h-8 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </div>
            <h2 id="error-title" class="text-2xl font-bold text-white mb-2">Booking Failed</h2>
            <p id="error-message" class="text-slate-400 mb-8">Sorry! Someone else just snatched this seat before you.</p>
            <button onclick="closeErrorModal()" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-semibold py-3 rounded-xl transition-all shadow-[0_0_15px_rgba(244,63,94,0.3)]">Got it, refresh</button>
        </div>
    </div>

    <div
      class="max-w-7xl w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50"
    >
      <div class="flex justify-end mb-4">
        <button id="logout-btn" class="bg-rose-500/20 hover:bg-rose-500/40 text-rose-400 border border-rose-500/30 px-4 py-2 rounded-lg transition-all font-medium text-sm">Logout</button>
      </div>
      <div class="text-center mb-10">
        <div id="user-info" class="mb-4 hidden">
          <p class="text-slate-300 font-medium">Welcome, <span id="username-display" class="text-emerald-400 font-bold">${}</span>!</p>
        </div>
        <h1
          class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 mb-4 tracking-tight"
        >
          ChaiCode Cinema - Now Showing<br />
          <br />
          <span class="text-red-400">
            <span class="font-bold">Dhurandhar The Revenge</span>
          </span>
        </h1>
        <p class="text-slate-400 text-lg">Jassi ko ghar ki yaad kyu nhi aai?</p>
      </div>

      <div class="flex justify-center mb-10">
        <div
          class="bg-slate-900/50 rounded-full px-6 py-3 border border-slate-700 flex gap-8 items-center"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.6)]"
            ></div>
            <span class="text-slate-300 font-medium tracking-wide"
              >Available</span
            >
          </div>
          <div class="w-px h-6 bg-slate-700"></div>
          <div class="flex items-center gap-3">
            <div
              class="w-4 h-4 rounded-full bg-rose-500/20 border border-rose-500/50"
            ></div>
            <span class="text-slate-400 font-medium tracking-wide">Booked</span>
          </div>
        </div>
      </div>

      <div class="flex justify-center">
        <div
          class="bg-slate-900/40 p-8 rounded-2xl border border-slate-700/50 shadow-inner"
        >
          <table
            id="tbl"
            class="border-separate border-spacing-4 mx-auto"
          ></table>
        </div>
      </div>
    </div>

    <script>
      function closeErrorModal() {
          document.getElementById('error-modal').classList.add('hidden');
          window.location.reload(); 
      }

      function showErrorModal(title, message) {
          document.getElementById('error-title').textContent = title;
          document.getElementById('error-message').textContent = message;
          document.getElementById('error-modal').classList.remove('hidden');
      }

      const token = localStorage.getItem('accessToken');
      if (!token) {
        window.location.href = "/login";
      }

      document.getElementById('logout-btn').addEventListener('click', async () => {
         await fetch('/api/auth/logout', { method: 'POST' });
         localStorage.removeItem('accessToken');
         localStorage.removeItem('username');
         window.location.href = "/login";
      });

      async function fetchWithAuth(url, options = {}) {
        let currentToken = localStorage.getItem('accessToken');
        const headers = {
            ...options.headers,
            'Authorization': `Bearer ${currentToken}`
        };

        let response = await fetch(url, { ...options, headers });
        
        if (response.status === 401) {
            const refreshRes = await fetch('/api/auth/refresh-token', { method: 'POST' });
            if (refreshRes.ok) {
                const data = await refreshRes.json();
                localStorage.setItem('accessToken', data.data.accessToken);
                headers['Authorization'] = `Bearer ${data.data.accessToken}`;
                response = await fetch(url, { ...options, headers });
            } else {
                localStorage.removeItem('accessToken');
                showErrorModal("Session Expired", "Please log in again. Redirecting...");
                setTimeout(() => window.location.href = "/login", 2000);
            }
        }
        return response;
      }

      async function run() {
        const storedName = localStorage.getItem('username');
        if (storedName) {
            document.getElementById('username-display').textContent = storedName;
            document.getElementById('user-info').classList.remove('hidden');
        }

        const tbl = document.getElementById("tbl");
        const res = await fetchWithAuth("/seats");
        if (!res || !res.ok) return; 
        const jsonResponse = await res.json();
        const resarray = jsonResponse.data || jsonResponse;
        const j = resarray.sort((a, b) => a.id - b.id);
        let tr;
        for (let i = 0; i < j.length; i++) {
          if (i % 8 === 0) tr = document.createElement("tr");

          const td = document.createElement("td");

          const baseClasses =
            "w-32 h-32 rounded-2xl text-center align-middle text-2xl font-bold transition-all duration-300 select-none relative group";

          if (j[i].isbooked) {
            td.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
            td.innerHTML = `
                    <span class="relative z-10">${j[i].id}</span>
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
                        Booked by: <span class="font-bold text-white ml-1">${j[i].name}</span>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[2px] border-[5px] border-transparent border-t-slate-900"></div>
                    </div>
                `;
          } else {
            td.className = `${baseClasses} bg-emerald-500 text-white border-2 border-emerald-400 shadow-[0_0_20px_rgba(16,185,129,0.3)] cursor-pointer hover:bg-emerald-400 hover:-translate-y-1.5 hover:shadow-[0_10px_25px_rgba(16,185,129,0.5)] active:scale-95 active:shadow-[0_0_10px_rgba(16,185,129,0.3)]`;
            td.innerHTML = `<span class="relative z-10">${j[i].id}</span>`;
          }

          td.addEventListener("click", async function (e) {
            const currentTd = e.currentTarget;
            if (currentTd.classList.contains("cursor-not-allowed")) {
              return; // Seat is already taken
            }

            try {
              const id = j[i].id; // Safe from loop closure
              
              const res = await fetchWithAuth(`/${id}`, { method: "PUT" });
              const data = await res.json();

              if (data.error) {
                document.getElementById('error-modal').classList.remove('hidden');
              } else {
                const returnedName = data.username;
                currentTd.className = `${baseClasses} bg-rose-500/10 text-rose-500/60 border border-rose-500/20 cursor-not-allowed`;
                currentTd.innerHTML = `
                            <span class="relative z-10">${id}</span>
                            <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-slate-900 border border-slate-700 text-sm text-slate-300 rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal shadow-[0_10px_25px_rgba(0,0,0,0.5)]">
                                Booked by: <span class="font-bold text-white ml-1">${returnedName}</span>
                                <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-slate-700"></div>
                                <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[2px] border-[5px] border-transparent border-t-slate-900"></div>
                            </div>
                        `;
              }
            } catch (ex) {
              showErrorModal("Error", "Error booking seat: " + ex);
            }
          });
          tr.appendChild(td);
          tbl.appendChild(tr);
        }
      }
      run();
    </script>
  </body>
</html>
