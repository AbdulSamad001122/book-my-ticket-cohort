<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ChaiCode Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
        body { font-family: "Outfit", sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

    <div class="bg-white max-w-md w-full rounded-lg shadow-md p-8 border border-gray-200">
        <h1 class="text-3xl font-bold text-gray-800 text-center mb-6">Create Account</h1>
        
        <div id="error-message" class="hidden mb-4 p-3 bg-red-100 text-red-700 rounded-md text-sm text-center"></div>
        <div id="success-message" class="hidden mb-4 p-3 bg-green-100 text-green-700 rounded-md text-sm text-center"></div>

        <form id="register-form" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Username (min 4 characters)</label>
                <input type="text" id="username" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password (min 8 characters)</label>
                <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2 rounded-md hover:bg-blue-700 transition">Register</button>
        </form>

        <p class="text-center text-gray-500 mt-6 text-sm">
            Already have an account? <a href="/login" class="text-blue-600 hover:underline">Log in here</a>
        </p>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorDiv.textContent = data.message || "Failed to register";
                    errorDiv.classList.remove('hidden');
                    return;
                }

                successDiv.textContent = "Registration successful! Redirecting to login...";
                successDiv.classList.remove('hidden');
                
                setTimeout(() => {
                    window.location.href = "/login";
                }, 1500);
            } catch (err) {
                errorDiv.textContent = "Network error occurred.";
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
