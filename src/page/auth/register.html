<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ChaiCode Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
        body { font-family: "Outfit", sans-serif; }
    </style>
</head>
<body
    class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
  >
    <div
      class="max-w-md w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50 transform transition-all duration-500 hover:scale-[1.01]"
    >
        <h1 class="text-4xl font-bold text-center mb-8 text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 tracking-tight">Create Account</h1>
        
        <div id="error-message" class="hidden mb-6 p-4 bg-rose-500/10 border border-rose-500/20 text-rose-400 rounded-xl text-sm text-center animate-pulse"></div>
        <div id="success-message" class="hidden mb-6 p-4 bg-emerald-500/10 border border-emerald-500/20 text-emerald-400 rounded-xl text-sm text-center"></div>

        <form id="register-form" class="space-y-6">
            <div class="space-y-2">
                <label for="username" class="block text-sm font-medium text-slate-300 ml-1">Username (min 4 chars)</label>
                <input type="text" id="username" class="w-full px-5 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all placeholder-slate-500" placeholder="Choose a username" required>
            </div>
            
            <div class="space-y-2">
                <label for="password" class="block text-sm font-medium text-slate-300 ml-1">Password (min 8 chars)</label>
                <input type="password" id="password" class="w-full px-5 py-3 bg-slate-900/50 border border-slate-700 rounded-xl text-white focus:outline-none focus:ring-2 focus:ring-emerald-500/50 focus:border-emerald-500/50 transition-all placeholder-slate-500" placeholder="••••••••" required>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-white font-bold py-3 rounded-xl hover:from-emerald-400 hover:to-teal-500 transition-all shadow-lg shadow-emerald-500/20 active:scale-[0.98]">
                Register
            </button>
        </form>

        <p class="text-center text-slate-400 mt-8 text-sm">
            Already have an account? <a href="/login" class="text-emerald-400 hover:text-emerald-300 font-semibold transition-colors">Log in here</a>
        </p>
    </div>

    <script>
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    errorDiv.textContent = data.message || "Failed to register";
                    errorDiv.classList.remove('hidden');
                    return;
                }

                successDiv.textContent = "Registration successful! Redirecting to login...";
                successDiv.classList.remove('hidden');
                
                setTimeout(() => {
                    window.location.href = "/login";
                }, 1500);
            } catch (err) {
                errorDiv.textContent = "Network error occurred.";
                errorDiv.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
